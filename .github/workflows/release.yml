name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish macOS arm64 release
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Check out tagged source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Show toolchain
        run: |
          test "$(uname -m)" = "arm64"
          swift --version

      - name: Test
        run: swift test

      - name: Build release binary
        run: swift build -c release --product semantouch

      - name: Verify tag and release metadata
        id: version
        shell: bash
        run: |
          set -euo pipefail
          binary="$(swift build -c release --show-bin-path)/semantouch"
          scripts/verify-release-metadata "$binary"
          version="$(/usr/bin/plutil -extract version raw package.json)"
          if [[ "$GITHUB_REF_NAME" != "v$version" ]]; then
            echo "tag $GITHUB_REF_NAME does not match package version $version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "binary=$binary" >> "$GITHUB_OUTPUT"

      - name: Import Developer ID certificate
        id: signing
        shell: bash
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          : "${CERTIFICATE_P12_BASE64:?DEVELOPER_ID_CERTIFICATE_P12_BASE64 is required}"
          : "${CERTIFICATE_PASSWORD:?DEVELOPER_ID_CERTIFICATE_PASSWORD is required}"

          keychain="$RUNNER_TEMP/semantouch-signing.keychain-db"
          echo "keychain=$keychain" >> "$GITHUB_OUTPUT"
          keychain_password="$(/usr/bin/openssl rand -hex 32)"
          certificate="$RUNNER_TEMP/developer-id-application.p12"
          printf '%s' "$CERTIFICATE_P12_BASE64" | /usr/bin/base64 -D > "$certificate"
          /bin/chmod 0600 "$certificate"

          /usr/bin/security create-keychain -p "$keychain_password" "$keychain"
          /usr/bin/security set-keychain-settings -lut 21600 "$keychain"
          /usr/bin/security unlock-keychain -p "$keychain_password" "$keychain"
          /usr/bin/security import "$certificate" \
            -k "$keychain" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          /usr/bin/security list-keychains -d user -s \
            "$keychain" \
            "$HOME/Library/Keychains/login.keychain-db"
          /usr/bin/security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$keychain_password" \
            "$keychain"

          identities="$(/usr/bin/security find-identity -v -p codesigning "$keychain" \
            | /usr/bin/sed -n 's/.*\"\(Developer ID Application:[^\"]*\)\".*/\1/p')"
          identity_count="$(printf '%s\n' "$identities" \
            | /usr/bin/awk 'NF { count += 1 } END { print count + 0 }')"
          expected_identity="Developer ID Application: Watzon Ventures LLc (MB5789APU7)"
          if [[ "$identity_count" != "1" || "$identities" != "$expected_identity" ]]; then
            echo "expected exactly one $expected_identity identity in imported certificate" >&2
            exit 1
          fi

          echo "identity=$identities" >> "$GITHUB_OUTPUT"

      - name: Sign release executable
        shell: bash
        env:
          BINARY: ${{ steps.version.outputs.binary }}
          SIGNING_IDENTITY: ${{ steps.signing.outputs.identity }}
        run: |
          set -euo pipefail
          mkdir -p dist
          asset="dist/semantouch-macos-arm64"
          /usr/bin/install -m 0755 "$BINARY" "$asset"
          scripts/sign-release "$asset" "$SIGNING_IDENTITY"
          "$asset" --version

      - name: Notarize release executable
        shell: bash
        env:
          NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          NOTARY_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_SPECIFIC_PASSWORD }}
          NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
        run: |
          set -euo pipefail
          : "${NOTARY_APPLE_ID:?APPLE_NOTARY_APPLE_ID is required}"
          : "${NOTARY_APP_SPECIFIC_PASSWORD:?APPLE_NOTARY_APP_SPECIFIC_PASSWORD is required}"
          : "${NOTARY_TEAM_ID:?APPLE_NOTARY_TEAM_ID is required}"

          notarization_archive="$RUNNER_TEMP/semantouch-notarization.zip"
          notarization_result="$RUNNER_TEMP/notarization.json"
          /usr/bin/ditto -c -k --keepParent \
            dist/semantouch-macos-arm64 \
            "$notarization_archive"

          /usr/bin/xcrun notarytool submit "$notarization_archive" \
            --apple-id "$NOTARY_APPLE_ID" \
            --password "$NOTARY_APP_SPECIFIC_PASSWORD" \
            --team-id "$NOTARY_TEAM_ID" \
            --wait \
            --output-format json > "$notarization_result"

          status="$(/usr/bin/plutil -extract status raw "$notarization_result")"
          if [[ "$status" != "Accepted" ]]; then
            /bin/cat "$notarization_result" >&2
            exit 1
          fi

      - name: Clean up signing material
        if: always()
        shell: bash
        env:
          SIGNING_KEYCHAIN: ${{ steps.signing.outputs.keychain }}
        run: |
          cleanup_failed=0

          if [[ -n "$SIGNING_KEYCHAIN" ]]; then
            if ! /usr/bin/security delete-keychain "$SIGNING_KEYCHAIN"; then
              /bin/rm -f "$SIGNING_KEYCHAIN"
            fi
            if [[ -e "$SIGNING_KEYCHAIN" ]]; then
              echo "failed to remove temporary signing keychain: $SIGNING_KEYCHAIN" >&2
              cleanup_failed=1
            fi
          fi

          /bin/rm -f \
            "$RUNNER_TEMP/developer-id-application.p12" \
            "$RUNNER_TEMP/semantouch-notarization.zip" \
            "$RUNNER_TEMP/notarization.json"

          if [[ -e "$RUNNER_TEMP/developer-id-application.p12" ]]; then
            echo "failed to remove decoded Developer ID certificate" >&2
            cleanup_failed=1
          fi

          exit "$cleanup_failed"
      - name: Package release assets
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          asset="dist/semantouch-macos-arm64"
          (cd dist && /usr/bin/shasum -a 256 semantouch-macos-arm64 > semantouch-macos-arm64.sha256)

          plugin_stage="$RUNNER_TEMP/semantouch"
          mkdir -p "$plugin_stage/bin" "$plugin_stage/scripts"
          cp -R .claude-plugin commands skills "$plugin_stage/"
          cp scripts/semantouch "$plugin_stage/scripts/"
          cp .mcp.json package.json LICENSE README.md "$plugin_stage/"
          /usr/bin/install -m 0755 "$asset" "$plugin_stage/bin/semantouch"

          archive="dist/semantouch-plugin-v$VERSION-macos-arm64.tar.gz"
          /usr/bin/tar -czf "$archive" -C "$RUNNER_TEMP" semantouch
          (cd dist && /usr/bin/shasum -a 256 "$(basename "$archive")" > "$(basename "$archive").sha256")

      - name: Create GitHub release and upload assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          assets=(
            dist/semantouch-macos-arm64
            dist/semantouch-macos-arm64.sha256
            "dist/semantouch-plugin-v$VERSION-macos-arm64.tar.gz"
            "dist/semantouch-plugin-v$VERSION-macos-arm64.tar.gz.sha256"
          )

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            is_draft="$(gh release view "$GITHUB_REF_NAME" --json isDraft --jq .isDraft)"
            if [[ "$is_draft" != "true" ]]; then
              echo "release $GITHUB_REF_NAME already exists; published assets are immutable" >&2
              exit 1
            fi
            gh release delete "$GITHUB_REF_NAME" --yes
          fi

          gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
            --draft \
            --verify-tag \
            --generate-notes \
            --title "Semantouch $VERSION"
          gh release edit "$GITHUB_REF_NAME" --draft=false

