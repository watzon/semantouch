name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test (macOS arm64)
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Show toolchain
        run: |
          uname -m
          swift --version

      - name: Validate release tooling
        run: |
          /bin/sh -n scripts/semantouch
          /bin/sh -n scripts/sign-release
          /bin/sh -n scripts/notarize-release
          /usr/bin/plutil -lint packaging/Release.entitlements

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Verify plugin release metadata
        run: |
          binary="$(swift build --show-bin-path)/semantouch"
          scripts/verify-release-metadata "$binary"
