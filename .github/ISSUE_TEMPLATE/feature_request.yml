name: Feature request
description: Propose a capability, tool, platform, or packaging improvement.
title: "Feature: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the user problem first. Semantouch prioritizes contract strength (stable IDs, diffs, policy, honest evidence) over copying other products’ surfaces.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can users or agents not do today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Tool/API/packaging change, including whether it is macOS-only or must be cross-platform.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Primary surface
      options:
        - MCP tool / protocol
        - CLI
        - macOS host/relay packaging
        - permissions / onboarding
        - Windows
        - Linux / Wayland
        - docs / community
        - other
    validations:
      required: true
  - type: textarea
    id: contract
    attributes:
      label: Contract and safety impact
      description: Effects on revisions, stale IDs, policy, interruption, TCC ownership, stdout discipline, private API boundary.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Acceptance evidence
      description: How would we know it works? Focused tests, fixture steps, capability matrix, or release checks.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional.
