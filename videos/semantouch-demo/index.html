<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Semantouch — evidence demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <!-- Deterministic evidence payload (generated by scripts/record-demo-evidence.mjs) -->
    <script src="assets/demo-evidence.js"></script>
    <script src="assets/evidence-ui.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000;
      }
      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #f2efe5;
      }
      /* Sub-composition slots fill the frame. */
      #root > div[data-composition-src] {
        position: absolute;
        inset: 0;
      }
      /* Lower-third caption rail — one timed clip per evidence caption (seek-safe). */
      .caption-rail {
        position: absolute;
        left: 96px;
        right: 96px;
        bottom: 36px;
        z-index: 40;
        pointer-events: none;
        font-family: sans-serif;
        font-size: 18px;
        line-height: 1.35;
        color: #173d2a;
      }
      .caption-rail .cap-inner {
        display: inline-block;
        background: rgba(242, 239, 229, 0.94);
        border-top: 2px solid #173d2a;
        border-bottom: 2px solid #173d2a;
        padding: 10px 16px;
        max-width: 1400px;
      }
      .caption-rail .cap-tag {
        font-family: monospace;
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        opacity: 0.55;
        margin-right: 12px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="38"
      data-width="1920"
      data-height="1080"
      data-fps="30"
    >
      <!--
        Storyboard durations (STORYBOARD.md):
          01-hook 4s | 02-observe 6s | 03-act 6s | 04-prove 6s
          05-wait 5s | 06-yield 6s | 07-close 5s  = 38s
      -->
      <div
        id="el-01-hook"
        data-composition-id="01-hook"
        data-composition-src="compositions/frames/01-hook.html"
        data-start="0"
        data-duration="4"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>
      <div
        id="el-02-observe"
        data-composition-id="02-observe"
        data-composition-src="compositions/frames/02-observe.html"
        data-start="4"
        data-duration="6"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>
      <div
        id="el-03-act"
        data-composition-id="03-act"
        data-composition-src="compositions/frames/03-act.html"
        data-start="10"
        data-duration="6"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>
      <div
        id="el-04-prove"
        data-composition-id="04-prove"
        data-composition-src="compositions/frames/04-prove.html"
        data-start="16"
        data-duration="6"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>
      <div
        id="el-05-wait"
        data-composition-id="05-wait"
        data-composition-src="compositions/frames/05-wait.html"
        data-start="22"
        data-duration="5"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>
      <div
        id="el-06-yield"
        data-composition-id="06-yield"
        data-composition-src="compositions/frames/06-yield.html"
        data-start="27"
        data-duration="6"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>
      <div
        id="el-07-close"
        data-composition-id="07-close"
        data-composition-src="compositions/frames/07-close.html"
        data-start="33"
        data-duration="5"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Captions are separate timed clips (no tl.call — seek-safe). Text filled from evidence. -->
      <div id="cap-01" class="clip caption-rail" data-start="0" data-duration="4" data-track-index="20">
        <div class="cap-inner"><span class="cap-tag">01</span><span data-cap="01-hook">—</span></div>
      </div>
      <div id="cap-02" class="clip caption-rail" data-start="4" data-duration="6" data-track-index="20">
        <div class="cap-inner"><span class="cap-tag">02</span><span data-cap="02-observe">—</span></div>
      </div>
      <div id="cap-03" class="clip caption-rail" data-start="10" data-duration="6" data-track-index="20">
        <div class="cap-inner"><span class="cap-tag">03</span><span data-cap="03-act">—</span></div>
      </div>
      <div id="cap-04" class="clip caption-rail" data-start="16" data-duration="6" data-track-index="20">
        <div class="cap-inner"><span class="cap-tag">04</span><span data-cap="04-prove">—</span></div>
      </div>
      <div id="cap-05" class="clip caption-rail" data-start="22" data-duration="5" data-track-index="20">
        <div class="cap-inner"><span class="cap-tag">05</span><span data-cap="05-wait">—</span></div>
      </div>
      <div id="cap-06" class="clip caption-rail" data-start="27" data-duration="6" data-track-index="20">
        <div class="cap-inner"><span class="cap-tag">06</span><span data-cap="06-yield">—</span></div>
      </div>
      <div id="cap-07" class="clip caption-rail" data-start="33" data-duration="5" data-track-index="20">
        <div class="cap-inner"><span class="cap-tag">07</span><span data-cap="07-close">—</span></div>
      </div>
    </div>

    <script>
      (function () {
        // Fail closed if evidence is missing/sample/incomplete before any timeline builds.
        const E = window.__SemantouchDemo.getEvidence();
        for (const step of E.sequence) {
          const node = document.querySelector('[data-cap="' + step.id + '"]');
          if (node) node.textContent = step.caption;
        }

        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        // Subtle caption entrance per window (seek-safe fromTo).
        const caps = [
          ["#cap-01", 0.15],
          ["#cap-02", 4.15],
          ["#cap-03", 10.15],
          ["#cap-04", 16.15],
          ["#cap-05", 22.15],
          ["#cap-06", 27.15],
          ["#cap-07", 33.15],
        ];
        for (const [sel, t] of caps) {
          tl.fromTo(
            sel,
            { opacity: 0, y: 8 },
            { opacity: 1, y: 0, duration: 0.35, ease: "power2.out" },
            t,
          );
        }

        window.__timelines["main"] = tl;

        window.__SEMANTOUCH_DEMO_SCHEDULE__ = [
          { id: "01-hook", start: 0, duration: 4 },
          { id: "02-observe", start: 4, duration: 6 },
          { id: "03-act", start: 10, duration: 6 },
          { id: "04-prove", start: 16, duration: 6 },
          { id: "05-wait", start: 22, duration: 5 },
          { id: "06-yield", start: 27, duration: 6 },
          { id: "07-close", start: 33, duration: 5 },
        ];
      })();
    </script>
  </body>
</html>
