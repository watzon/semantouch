<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>04-prove</title>
  </head>
  <body>
    <template>
      <style>
        #root {
          position: absolute;
          inset: 0;
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          color: #173d2a;
          font-family: sans-serif;
          background-color: #f2efe5;
          background-image:
            linear-gradient(rgba(77, 245, 69, 0.1) 1px, transparent 1px),
            linear-gradient(90deg, rgba(77, 245, 69, 0.1) 1px, transparent 1px);
          background-size: 38.4px 38.4px;
        }
        .hairline {
          position: absolute;
          left: 76.8px;
          right: 76.8px;
          border-top: 2.3px solid #173d2a;
        }
        .hairline.top {
          top: 57.6px;
        }
        .hairline.bottom {
          bottom: 57.6px;
        }
        .kicker {
          position: absolute;
          top: 90px;
          left: 96px;
          font-weight: 600;
          letter-spacing: 0.16em;
          text-transform: uppercase;
          font-size: 13px;
        }
        .title {
          position: absolute;
          top: 130px;
          left: 96px;
          font-family: serif;
          font-size: 44px;
          line-height: 1.05;
          max-width: 1100px;
        }
        .cols {
          position: absolute;
          top: 250px;
          left: 96px;
          right: 96px;
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 48px;
        }
        .col h3 {
          font-family: monospace;
          font-size: 14px;
          letter-spacing: 0.1em;
          text-transform: uppercase;
          margin: 0 0 16px;
          border-bottom: 2px solid #173d2a;
          padding-bottom: 10px;
        }
        .col pre {
          margin: 0;
          font-family: monospace;
          font-size: 15px;
          line-height: 1.7;
          white-space: pre-wrap;
        }
        .proof {
          position: absolute;
          left: 96px;
          right: 96px;
          top: 620px;
          border: 2px solid #4df545;
          color: #1f6b1c;
          font-family: monospace;
          font-size: 16px;
          padding: 16px 20px;
          letter-spacing: 0.04em;
        }
        .reject {
          position: absolute;
          left: 96px;
          right: 96px;
          bottom: 110px;
          border: 2px solid #173d2a;
          padding: 18px 22px;
          font-family: monospace;
          font-size: 15px;
          display: grid;
          grid-template-columns: 160px 1fr 220px;
          gap: 20px;
          align-items: center;
        }
        .reject .code {
          color: #1f6b1c;
          letter-spacing: 0.08em;
          text-transform: uppercase;
        }
        .dim {
          opacity: 0.55;
        }
      </style>

      <div id="root" data-composition-id="04-prove" data-width="1920" data-height="1080" data-duration="6">
        <div class="hairline top"></div>
        <div class="hairline bottom"></div>
        <div class="kicker">04 · PROVE</div>
        <div class="title">Revision N becomes N+1.<br />Reuse of N fails closed.</div>
        <div class="cols">
          <div class="col" id="p4-before">
            <h3>revision <span id="p4-base">—</span> (before)</h3>
            <pre id="p4-before-text">[e1] AXWindow "App"
  [e2] AXButton "Run" enabled=false
  [e3] AXStaticText value="Idle"</pre>
          </div>
          <div class="col" id="p4-after">
            <h3>revision <span id="p4-rev">—</span> (after)</h3>
            <pre id="p4-after-text">—</pre>
          </div>
        </div>
        <div class="proof" id="p4-proof">apply(diff, N) = N+1 · reconstructable</div>
        <div class="reject" id="p4-reject">
          <div class="dim">attempt</div>
          <div>click · session s1 · revision <span id="p4-stale-prov">—</span> · element e2</div>
          <div class="code" id="p4-code">—</div>
        </div>
      </div>

      <script>
        (function () {
          const E = window.__SemantouchDemo;
          const step = E.frameById("04-prove");
          const diff = E.claim(step, "diff");
          const stale = E.claim(step, "stale_revision");
          E.text(document.getElementById("p4-base"), String(diff.baseRevision));
          E.text(document.getElementById("p4-rev"), String(diff.revision));
          E.text(document.getElementById("p4-after-text"), diff.tree.text);
          E.text(document.getElementById("p4-proof"), diff.equality);
          E.text(document.getElementById("p4-stale-prov"), String(stale.data.provided));
          E.text(document.getElementById("p4-code"), stale.code);

          window.__timelines = window.__timelines || {};
          const tl = gsap.timeline({ paused: true });
          tl.fromTo("#p4-before", { opacity: 0, x: -20 }, { opacity: 1, x: 0, duration: 0.5, ease: "power2.out" }, 0.15);
          tl.fromTo("#p4-after", { opacity: 0, x: 20 }, { opacity: 1, x: 0, duration: 0.5, ease: "power2.out" }, 0.35);
          tl.fromTo("#p4-proof", { opacity: 0, y: 12 }, { opacity: 1, y: 0, duration: 0.45 }, 2.3);
          tl.fromTo("#p4-reject", { opacity: 0, y: 16 }, { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" }, 4.3);
          window.__timelines["04-prove"] = tl;
        })();
      </script>
    </template>
  </body>
</html>
