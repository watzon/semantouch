<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>05-wait</title>
  </head>
  <body>
    <template>
      <style>
        #root {
          position: absolute;
          inset: 0;
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          color: #173d2a;
          font-family: sans-serif;
          background-color: #f2efe5;
          background-image:
            linear-gradient(rgba(77, 245, 69, 0.1) 1px, transparent 1px),
            linear-gradient(90deg, rgba(77, 245, 69, 0.1) 1px, transparent 1px);
          background-size: 38.4px 38.4px;
        }
        .hairline {
          position: absolute;
          left: 76.8px;
          right: 76.8px;
          border-top: 2.3px solid #173d2a;
        }
        .hairline.top {
          top: 57.6px;
        }
        .hairline.bottom {
          bottom: 57.6px;
        }
        .kicker {
          position: absolute;
          top: 90px;
          left: 96px;
          font-weight: 600;
          letter-spacing: 0.16em;
          text-transform: uppercase;
          font-size: 13px;
        }
        .title {
          position: absolute;
          top: 140px;
          left: 96px;
          font-family: serif;
          font-size: 56px;
          line-height: 1.0;
          max-width: 1200px;
        }
        .rail-wrap {
          position: absolute;
          left: 96px;
          right: 96px;
          top: 420px;
        }
        .rail-lab {
          display: flex;
          justify-content: space-between;
          font-family: monospace;
          font-size: 13px;
          letter-spacing: 0.08em;
          text-transform: uppercase;
          margin-bottom: 14px;
        }
        .rail {
          position: relative;
          height: 4px;
          background: rgba(23, 61, 42, 0.18);
        }
        .rail-fill {
          position: absolute;
          left: 0;
          top: 0;
          bottom: 0;
          width: 100%;
          transform-origin: left center;
          transform: scaleX(0);
          background: #4df545;
        }
        .ticks {
          position: relative;
          height: 80px;
          margin-top: 8px;
        }
        .tick {
          position: absolute;
          top: 0;
          width: 2px;
          height: 18px;
          background: #173d2a;
          opacity: 0.35;
        }
        .tick.on {
          background: #4df545;
          opacity: 1;
          height: 28px;
        }
        .tick-label {
          position: absolute;
          top: 36px;
          transform: translateX(-50%);
          font-family: monospace;
          font-size: 12px;
          white-space: nowrap;
        }
        .outcome {
          position: absolute;
          left: 96px;
          bottom: 140px;
          display: grid;
          grid-template-columns: 280px 280px 360px;
          gap: 40px;
          font-family: monospace;
          font-size: 16px;
        }
        .outcome .lab {
          display: block;
          opacity: 0.55;
          font-size: 12px;
          letter-spacing: 0.12em;
          text-transform: uppercase;
          margin-bottom: 8px;
          font-family: sans-serif;
          font-weight: 600;
        }
        .ok {
          color: #1f6b1c;
        }
        .dim {
          opacity: 0.35;
          text-decoration: line-through;
        }
      </style>

      <div id="root" data-composition-id="05-wait" data-width="1920" data-height="1080" data-duration="5">
        <div class="hairline top"></div>
        <div class="hairline bottom"></div>
        <div class="kicker">05 · WAIT</div>
        <div class="title">Bounded polling.<br />Typed outcome. No blind sleep.</div>
        <div class="rail-wrap" id="w5-rail">
          <div class="rail-lab">
            <span>request</span>
            <span id="w5-cond">title_contains</span>
            <span>deadline</span>
          </div>
          <div class="rail">
            <div class="rail-fill" id="w5-fill"></div>
          </div>
          <div class="ticks" id="w5-ticks">
            <div class="tick" style="left: 12%"></div>
            <div class="tick" style="left: 28%"></div>
            <div class="tick" style="left: 44%"></div>
            <div class="tick on" style="left: 62%" id="w5-match"></div>
            <div class="tick" style="left: 88%; opacity: 0.15"></div>
            <div class="tick-label" style="left: 62%" id="w5-match-lab">matched</div>
          </div>
        </div>
        <div class="outcome" id="w5-out">
          <div>
            <span class="lab">outcome</span>
            <span class="ok" id="w5-sat">—</span>
          </div>
          <div>
            <span class="lab">elapsed</span>
            <span id="w5-ms">—</span>
          </div>
          <div>
            <span class="lab">timeout branch</span>
            <span class="dim" id="w5-to">timeout</span>
          </div>
        </div>
      </div>

      <script>
        (function () {
          const E = window.__SemantouchDemo;
          const step = E.frameById("05-wait");
          const wait = E.claim(step, "wait_for");
          E.text(document.getElementById("w5-cond"), wait.request.conditions[0].kind);
          E.text(
            document.getElementById("w5-sat"),
            wait.result.satisfied ? "satisfied" : "unsatisfied",
          );
          E.text(document.getElementById("w5-ms"), wait.result.elapsedMs + " ms");
          E.text(document.getElementById("w5-to"), "timeout");

          window.__timelines = window.__timelines || {};
          const tl = gsap.timeline({ paused: true });
          tl.fromTo("#w5-fill", { scaleX: 0, transformOrigin: "left center" }, { scaleX: 0.62, duration: 2.0, ease: "none" }, 0.4);
          tl.fromTo("#w5-ticks .tick", { opacity: 0 }, { opacity: 0.35, duration: 0.2, stagger: 0.18 }, 1.5);
          tl.to("#w5-match", { opacity: 1, height: 28, background: "#4df545", duration: 0.25 }, 3.0);
          tl.fromTo("#w5-match-lab", { opacity: 0 }, { opacity: 1, duration: 0.3 }, 3.1);
          tl.fromTo("#w5-out", { opacity: 0, y: 12 }, { opacity: 1, y: 0, duration: 0.45 }, 3.8);
          window.__timelines["05-wait"] = tl;
        })();
      </script>
    </template>
  </body>
</html>
